<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#0d1b2a">
  <title>Ashwin & Ayushi Reception</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta property="og:title" content="Ashwin & Ayushi Wedding Reception">

  <meta property="og:description" content="We warmly invite you to celebrate the Wedding Reception on 18 July 2026 at Kochi.">

  <meta property="og:image" content="https://benoy89.github.io/ashwin-ayushi-reception/images/preview.png">

  <meta property="og:url" content="https://benoy89.github.io/ashwin-ayushi-reception/">

  <meta property="og:type" content="website">

  <meta property="og:image:width" content="891">
  <meta property="og:image:height" content="891">

  <meta name="twitter:card" content="summary_large_image">

<body>

<button id="musicBtn">Play Music</button>
<button id="shareBtn">Share</button>

<div id="loader">

  <p>Loading Invitation...</p>
</div>

<div id="swipeHint">Swipe or tap to turn page →</div>

<div class="sparkles"></div>

<div id="flipbook">
  <div class="page zoom-page">
    <img src="images/page1-cover.png">
  </div>

  <div class="page zoom-page">
    <img src="images/page2-photo.JPG">
  </div>

  <div class="page zoom-page">
    <img src="images/page3-details.png">
  </div>

  <div class="page zoom-page">
    <img src="images/page4-thankyou.png">
  </div>
</div>

<audio id="bgMusic" loop>
  <source src="audio/music.mp3" type="audio/mpeg">
</audio>

<audio id="flipSound">
  <source src="audio/flip.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
<script>
  window.scrollTo(0,1);
</script>
